<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Tic Tac Toe</title>

<style>
body{
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.container{
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,110px);
    gap:10px;
    margin-top:20px;
}

.cell{
    width:110px;
    height:110px;
    background:white;
    color:black;
    font-size:45px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border-radius:12px;
    transition:.3s;
}

.cell:hover{
    transform:scale(1.08);
    background:#e6e6e6;
}

.win{
    background:#00ffae !important;
    animation:blink 0.6s infinite alternate;
}

@keyframes blink{
    from{opacity:1;}
    to{opacity:0.5;}
}

button{
    margin-top:15px;
    padding:10px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    cursor:pointer;
}

button:hover{
    background:#ffaa00;
}

.score{
    margin-top:15px;
    font-size:18px;
}

@media(max-width:500px){
    .board{
        grid-template-columns:repeat(3,85px);
    }
    .cell{
        width:85px;
        height:85px;
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 Tic Tac Toe vs AI</h1>

<div class="score">
Player: <span id="pScore">0</span> |
AI: <span id="aScore">0</span>
</div>

<div class="board" id="board"></div>

<h2 id="status">Your Turn</h2>

<button onclick="restart()">Restart</button>

</div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-notification-2018.mp3"></audio>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let cells = [];
let state = ["","","","","","","","",""];
let gameActive = true;

let playerScore = 0;
let aiScore = 0;

const winCombos = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

for(let i=0;i<9;i++){
    let cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index=i;
    board.appendChild(cell);
    cells.push(cell);

    cell.addEventListener("click", playerMove);
}

function playerMove(){
    let index = this.dataset.index;

    if(state[index]!=="" || !gameActive) return;

    clickSound.play();
    makeMove(index,"X");

    if(gameActive){
        setTimeout(aiMove,400);
    }
}

function aiMove(){
    let empty = state.map((v,i)=> v===""?i:null).filter(v=>v!==null);
    let random = empty[Math.floor(Math.random()*empty.length)];
    makeMove(random,"O");
}

function makeMove(index,player){
    state[index]=player;
    cells[index].innerText=player;

    checkWinner(player);
}

function checkWinner(player){
    for(let combo of winCombos){
        let [a,b,c]=combo;

        if(state[a] && state[a]===state[b] && state[a]===state[c]){
            cells[a].classList.add("win");
            cells[b].classList.add("win");
            cells[c].classList.add("win");

            winSound.play();

            if(player==="X"){
                playerScore++;
                document.getElementById("pScore").innerText=playerScore;
                statusText.innerText="🎉 You Win!";
            }else{
                aiScore++;
                document.getElementById("aScore").innerText=aiScore;
                statusText.innerText="🤖 AI Wins!";
            }

            gameActive=false;
            return;
        }
    }

    if(!state.includes("")){
        statusText.innerText="😮 Draw!";
        gameActive=false;
    }
}

function restart(){
    state=["","","","","","","","",""];
    gameActive=true;
    statusText.innerText="Your Turn";

    cells.forEach(c=>{
        c.innerText="";
        c.classList.remove("win");
    });
}
</script>

</body>
</html>
